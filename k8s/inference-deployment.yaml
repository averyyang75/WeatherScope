# WeatherScope Inference Service Deployment
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-config
  namespace: weatherscope
data:
  UPSCALE_FACTOR: "4"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-deployment
  namespace: weatherscope
  labels:
    app: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
    spec:
      containers:
        - name: inference
          image: weatherscope-inference:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: inference-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: inference-service
  namespace: weatherscope
spec:
  selector:
    app: inference
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
