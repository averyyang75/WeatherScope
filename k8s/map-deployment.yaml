# WeatherScope Map Service Deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: map-deployment
  namespace: weatherscope
  labels:
    app: map
spec:
  replicas: 1
  selector:
    matchLabels:
      app: map
  template:
    metadata:
      labels:
        app: map
    spec:
      containers:
        - name: map
          image: weatherscope-map:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: map-service
  namespace: weatherscope
spec:
  selector:
    app: map
  ports:
    - protocol: TCP
      port: 8004
      targetPort: 8004
  type: ClusterIP
